serenity {
    take.screenshots = FOR_FAILURES
}

webdriver {
driver = chrome
autodownload = true
# This is the "Base URL" that Serenity looks for
base.url = "https://automationexercise.com/login"

capabilities {
browserName = "chrome"
acceptInsecureCerts = true
"goog:chromeOptions" {
args = ["remote-allow-origins=*", "test-type", "no-sandbox", "ignore-certificate-errors", "incognito"]
}
}
}